name: 🐳 Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "${{ matrix.target }} ${{ matrix.arch }}"
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        target:
          - consumer
          - producer

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=ghcr.io/${{ github.repository }}/${{ matrix.target }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: 📤 Export digest
        if: github.event_name != 'pull_request'
        working-directory: ${{ runner.temp }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "digests/${{ matrix.target }}"
          printenv DIGEST > "digests/${{ matrix.target }}/${{ matrix.arch }}.digest"
          printenv DOCKER_METADATA_OUTPUT_JSON > "digests/${{ matrix.target }}/meta.json"

      - name: 📦 Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.target }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      packages: write

    steps:
      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 📥 Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🔗 Create multiarch images
        working-directory: ${{ runner.temp }}
        run: |
          for image in $(ls digests); do
            readarray -t args < <(jq -r '(.tags[]|"--tag=\(.)")' < "digests/$image/meta.json")
            docker buildx imagetools create "${args[@]}" $(cat digests/$image/*.digest)
            docker buildx imagetools inspect $(jq -r '.tags[0]' < "digests/$image/meta.json")
          done

  integration-tests:
    runs-on: ubuntu-latest
    name: 🔗 Integration Tests (${{ matrix.example }})
    needs: build
    strategy:
      matrix:
        example:
          - idp_cascading_failures
          - idp_error_handling
          - idp_health_check_rpc
          - idp_proxy_middleware
          - idp_resilience

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🏗️ Build consumer
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          cache-from: type=gha
          context: .
          load: true
          target: consumer

      - name: 🏗️ Build producer
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          cache-from: type=gha
          context: .
          load: true
          target: producer

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: 🔧 Set up Docker Compose
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: latest

      - name: 📦 Pull dependencies
        run: docker compose pull
        working-directory: examples/${{ matrix.example }}

      - name: 🔗 Run integration tests
        run: bun test
        working-directory: examples/${{ matrix.example }}
