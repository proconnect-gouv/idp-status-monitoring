name: 🐳 Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "${{ matrix.target }} ${{ matrix.arch }}"
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        target:
          - consumer
          - producer

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🔐 Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=ghcr.io/${{ github.repository }}/${{ matrix.target }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: 📤 Export digest
        if: github.event_name != 'pull_request'
        working-directory: ${{ runner.temp }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "digests/${{ matrix.target }}"
          printenv DIGEST > "digests/${{ matrix.target }}/${{ matrix.arch }}.digest"
          printenv DOCKER_METADATA_OUTPUT_JSON > "digests/${{ matrix.target }}/meta.json"

      - name: 📦 Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.target }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      packages: write

    steps:
      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 📥 Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🔗 Create multiarch images
        working-directory: ${{ runner.temp }}
        run: |
          for image in $(ls digests); do
            readarray -t args < <(jq -r '(.tags[]|"--tag=\(.)")' < "digests/$image/meta.json")
            docker buildx imagetools create "${args[@]}" $(cat digests/$image/*.digest)
            docker buildx imagetools inspect $(jq -r '.tags[0]' < "digests/$image/meta.json")
          done

  list-examples:
    runs-on: ubuntu-latest
    name: 📋 List examples
    outputs:
      examples: ${{ steps.list.outputs.examples }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📋 List example directories
        id: list
        run: echo "examples=$(ls -d examples/*/ | xargs -n1 basename | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

  integration-tests:
    runs-on: ubuntu-latest
    name: 🔗 Integration Tests (${{ matrix.example }})
    needs: [build, list-examples]
    strategy:
      matrix:
        example: ${{ fromJSON(needs.list-examples.outputs.examples) }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🏗️ Build consumer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          cache-from: type=gha
          context: .
          load: true
          target: consumer

      - name: 🏗️ Build producer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          cache-from: type=gha
          context: .
          load: true
          target: producer

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: 🔧 Set up Docker Compose
        uses: docker/setup-compose-action@4eb059ff7f16592f9c84d5ca339c53cb7c5064e2 # v2.3.0
        with:
          version: latest

      - name: 📦 Pull dependencies
        run: docker compose pull
        working-directory: examples/${{ matrix.example }}

      - name: 🔗 Run integration tests
        run: bun test
        working-directory: examples/${{ matrix.example }}
