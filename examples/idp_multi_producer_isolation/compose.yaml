services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 500ms
      timeout: 1s
      retries: 10
      start_period: 2s

  auth.fenris.space-wolves:
    image: nginx:alpine
    volumes:
      - ./auth.fenris.space-wolves.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  auth.asaheim.space-wolves:
    image: nginx:alpine
    volumes:
      - ./auth.asaheim.space-wolves.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  producer_alpha:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: producer
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - IDP_URLS=["http://auth.fenris.space-wolves","http://auth.asaheim.space-wolves"]
      - QUEUE_PRODUCER_NAME=monitoring-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth.fenris.space-wolves:
        condition: service_healthy
      auth.asaheim.space-wolves:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  producer_bravo:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: producer
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - IDP_URLS=["http://auth.fenris.space-wolves","http://auth.asaheim.space-wolves"]
      - QUEUE_PRODUCER_NAME=monitoring-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth.fenris.space-wolves:
        condition: service_healthy
      auth.asaheim.space-wolves:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  consumer:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: consumer
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - QUEUE_PRODUCER_NAME=monitoring-producer
      - MAP_FI_NAMES_TO_URL={"fenris":"http://auth.fenris.space-wolves","asaheim":"http://auth.asaheim.space-wolves"}
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth.fenris.space-wolves:
        condition: service_healthy
      auth.asaheim.space-wolves:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/readyz",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  test_runner:
    image: curlimages/curl:latest
    depends_on:
      - rabbitmq
      - auth.fenris.space-wolves
      - auth.asaheim.space-wolves
      - producer_alpha
      - producer_bravo
      - consumer
    entrypoint: ["sleep", "infinity"]
