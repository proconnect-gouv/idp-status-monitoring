server {
    listen 80;
    server_name auth.asaheim.space-wolves;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 200 "The Fang stands eternal. Asaheim authentication holds firm.";
        add_header Content-Type text/plain;
    }
}
