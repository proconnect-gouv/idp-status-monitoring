server {
    listen 80;
    server_name auth.fenris.space-wolves;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 200 "For Russ and the Allfather! Fenris authentication endures.";
        add_header Content-Type text/plain;
    }
}
