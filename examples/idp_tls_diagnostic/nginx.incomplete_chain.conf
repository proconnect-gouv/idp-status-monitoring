server {
    listen 80;
    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }
}

server {
    listen 443 ssl;
    # Leaf cert only — intermediate CA deliberately omitted from chain
    ssl_certificate /certs/incomplete_chain.crt;
    ssl_certificate_key /certs/incomplete_chain.key;

    location / {
        add_header Content-Type application/json;
        return 200 '{"status":"Fallen Angels authentication active"}';
    }
}
