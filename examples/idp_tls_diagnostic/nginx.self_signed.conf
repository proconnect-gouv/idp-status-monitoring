server {
    listen 80;
    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }
}

server {
    listen 443 ssl;
    ssl_certificate /certs/self_signed.crt;
    ssl_certificate_key /certs/self_signed.key;

    location / {
        add_header Content-Type application/json;
        return 200 '{"status":"Fortress-monastery authentication active"}';
    }
}
