services:
  auth.self-signed.darkangels:
    image: nginx:alpine
    volumes:
      - ./nginx.self_signed.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  auth.expired.darkangels:
    image: nginx:alpine
    volumes:
      - ./nginx.expired.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  auth.incomplete-chain.darkangels:
    image: nginx:alpine
    volumes:
      - ./nginx.incomplete_chain.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  auth.valid.darkangels:
    image: nginx:alpine
    volumes:
      - ./nginx.valid.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 5

  test_runner:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: consumer
    environment:
      - NODE_EXTRA_CA_CERTS=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro
    depends_on:
      auth.self-signed.darkangels:
        condition: service_healthy
      auth.expired.darkangels:
        condition: service_healthy
      auth.incomplete-chain.darkangels:
        condition: service_healthy
      auth.valid.darkangels:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]
